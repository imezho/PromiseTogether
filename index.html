<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#FAF7F0" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="같이지켜" />
<title>같이지켜</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" rel="stylesheet" />
<style>
/* ========== 기본 리셋 & 변수 ========== */
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

:root {
  /* 컬러 - 따뜻한 크림 베이스 */
  --bg: #FAF7F0;
  --bg-elev: #FFFFFF;
  --bg-soft: #F2EDE2;
  --bg-sage-soft: #E8F0E6;
  --bg-coral-soft: #FCEAE0;
  --bg-lavender-soft: #EDE8F2;
  --bg-mute: #F5F1E6;

  /* 텍스트 */
  --ink-1: #2D2A24;
  --ink-2: #5C5448;
  --ink-3: #8B8170;
  --ink-4: #B5AC9E;

  /* 포인트 */
  --sage: #7DA384;
  --sage-dark: #6A8E72;
  --sage-light: #A8C4AD;
  --coral: #E89070;
  --coral-dark: #D67555;
  --lavender: #A89AC9;
  --honey: #E8B765;
  --sky: #7FB5D1;

  /* 보더 */
  --border-soft: #EDE7DA;
  --border-mute: #F2EDE2;

  /* 그림자 */
  --shadow-card: 0 2px 8px rgba(93, 75, 47, 0.05), 0 1px 2px rgba(93, 75, 47, 0.04);
  --shadow-card-hover: 0 4px 16px rgba(93, 75, 47, 0.08);
  --shadow-fab: 0 4px 14px rgba(125, 163, 132, 0.32), 0 2px 6px rgba(125, 163, 132, 0.18);
  --shadow-modal: 0 -8px 30px rgba(93, 75, 47, 0.12);

  /* 트랜지션 */
  --t-fast: 0.15s ease;
  --t-med: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
  --t-spring: 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);

  /* 폰트 */
  --font: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', system-ui, sans-serif;
}

html, body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--ink-1);
  -webkit-font-smoothing: antialiased;
  font-feature-settings: 'ss06' on, 'ss07' on;
  letter-spacing: -0.01em;
  overscroll-behavior-y: contain;
}

body {
  min-height: 100vh;
  min-height: 100svh;
}

button {
  font-family: inherit;
  background: none;
  border: none;
  cursor: pointer;
  color: inherit;
  letter-spacing: -0.01em;
}

input, textarea {
  font-family: inherit;
  outline: none;
  border: none;
  letter-spacing: -0.01em;
}

/* ========== 컨테이너 ========== */
#app {
  max-width: 500px;
  margin: 0 auto;
  min-height: 100vh;
  min-height: 100svh;
  background: var(--bg);
  position: relative;
  padding-bottom: 96px;
  padding-bottom: calc(96px + env(safe-area-inset-bottom));
}

.screen { 
  animation: screenIn 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
}

@keyframes screenIn {
  from { opacity: 0; transform: translateY(4px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ========== 로그인 화면 ========== */
.login-wrap {
  min-height: 100vh;
  min-height: 100svh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
  background: linear-gradient(180deg, #FAF7F0 0%, #F0E9D9 100%);
  position: relative;
  overflow: hidden;
}

.login-wrap::before {
  content: '';
  position: absolute;
  top: -100px;
  right: -100px;
  width: 300px;
  height: 300px;
  background: radial-gradient(circle, rgba(168, 196, 173, 0.25), transparent 70%);
  border-radius: 50%;
}
.login-wrap::after {
  content: '';
  position: absolute;
  bottom: -120px;
  left: -80px;
  width: 280px;
  height: 280px;
  background: radial-gradient(circle, rgba(232, 144, 112, 0.18), transparent 70%);
  border-radius: 50%;
}

.login-card {
  width: 100%;
  max-width: 380px;
  background: rgba(255,255,255,0.85);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-radius: 28px;
  padding: 36px 28px;
  box-shadow: 0 8px 32px rgba(93, 75, 47, 0.08), 0 2px 8px rgba(93, 75, 47, 0.04);
  position: relative;
  z-index: 1;
  animation: cardPop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
}

@keyframes cardPop {
  from { opacity: 0; transform: scale(0.92) translateY(12px); }
  to { opacity: 1; transform: scale(1) translateY(0); }
}

.login-emoji {
  font-size: 52px;
  text-align: center;
  margin-bottom: 4px;
  animation: bounce 2s ease-in-out infinite;
}
@keyframes bounce {
  0%, 100% { transform: translateY(0) rotate(-3deg); }
  50% { transform: translateY(-6px) rotate(3deg); }
}

.login-title {
  font-size: 26px;
  font-weight: 700;
  color: var(--ink-1);
  text-align: center;
  letter-spacing: -0.04em;
  margin-top: 8px;
}

.login-sub {
  font-size: 14px;
  color: var(--ink-3);
  text-align: center;
  margin-top: 6px;
  font-weight: 500;
}

.login-form { margin-top: 32px; }

.input-label {
  display: block;
  font-size: 12px;
  font-weight: 600;
  color: var(--ink-2);
  margin-bottom: 8px;
  letter-spacing: 0.02em;
}

.text-input {
  width: 100%;
  padding: 15px 18px;
  background: rgba(250, 247, 240, 0.7);
  border: 1.5px solid var(--border-soft);
  border-radius: 16px;
  font-size: 15px;
  font-weight: 500;
  color: var(--ink-1);
  transition: all var(--t-med);
}
.text-input:focus {
  background: white;
  border-color: var(--sage);
  box-shadow: 0 0 0 4px rgba(125, 163, 132, 0.12);
}
.text-input::placeholder { color: var(--ink-4); }

.user-chips {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-top: 8px;
}

.user-chip {
  font-size: 12px;
  font-weight: 500;
  padding: 6px 12px;
  background: var(--bg-mute);
  color: var(--ink-2);
  border-radius: 100px;
  transition: all var(--t-fast);
}

.user-chips-label {
  font-size: 11px;
  color: var(--ink-4);
  margin-bottom: 8px;
  margin-top: 20px;
  font-weight: 500;
}

.error-text {
  font-size: 12px;
  color: var(--coral-dark);
  margin-top: 8px;
  font-weight: 500;
}

.btn-primary {
  width: 100%;
  padding: 16px;
  background: var(--sage);
  color: white;
  border-radius: 16px;
  font-size: 15px;
  font-weight: 700;
  letter-spacing: -0.02em;
  margin-top: 24px;
  transition: all var(--t-med);
}
.btn-primary:hover { background: var(--sage-dark); }
.btn-primary:active { transform: scale(0.98); }
.btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }

/* ========== 헤더 ========== */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 20px;
  background: var(--bg);
  position: sticky;
  top: 0;
  z-index: 10;
}

.header-back {
  width: 38px;
  height: 38px;
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--bg-elev);
  box-shadow: var(--shadow-card);
  transition: all var(--t-fast);
}
.header-back:active { transform: scale(0.92); }

.header-title {
  font-size: 16px;
  font-weight: 700;
  color: var(--ink-1);
  letter-spacing: -0.02em;
}

.header-spacer { width: 38px; }

/* ========== 홈 헤더 ========== */
.home-header {
  padding: 24px 20px 8px;
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
}

.greet-small { font-size: 13px; color: var(--ink-3); font-weight: 500; }
.greet-big { font-size: 24px; font-weight: 800; color: var(--ink-1); margin-top: 2px; letter-spacing: -0.04em; }

.bell {
  width: 44px;
  height: 44px;
  background: var(--bg-elev);
  border-radius: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  box-shadow: var(--shadow-card);
  transition: all var(--t-fast);
}
.bell:active { transform: scale(0.92); }

.bell-badge {
  position: absolute;
  top: -4px;
  right: -4px;
  min-width: 20px;
  height: 20px;
  background: var(--coral);
  color: white;
  font-size: 10px;
  font-weight: 700;
  border-radius: 10px;
  padding: 0 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  border: 2px solid var(--bg);
  animation: badgePulse 1.8s ease-in-out infinite;
}
@keyframes badgePulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.12); }
}

/* ========== 날짜 네비게이션 ========== */
.date-nav {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 16px;
  margin: 4px 20px 16px;
  padding: 10px 12px;
  background: var(--bg-elev);
  border-radius: 18px;
  box-shadow: var(--shadow-card);
}

.date-arrow {
  width: 30px;
  height: 30px;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--ink-3);
  transition: all var(--t-fast);
}
.date-arrow:active { transform: scale(0.9); background: var(--bg-mute); }
.date-arrow:disabled { opacity: 0.3; }

.date-label {
  flex: 1;
  text-align: center;
  font-size: 14px;
  font-weight: 700;
  color: var(--ink-1);
  letter-spacing: -0.02em;
}

.date-today-badge {
  display: inline-block;
  font-size: 10px;
  font-weight: 700;
  padding: 2px 8px;
  background: var(--bg-sage-soft);
  color: var(--sage-dark);
  border-radius: 100px;
  margin-left: 6px;
  vertical-align: middle;
}
.date-past-badge {
  display: inline-block;
  font-size: 10px;
  font-weight: 700;
  padding: 2px 8px;
  background: var(--bg-mute);
  color: var(--ink-3);
  border-radius: 100px;
  margin-left: 6px;
  vertical-align: middle;
}

/* ========== 진행률 카드 ========== */
.progress-card {
  margin: 0 20px 20px;
  padding: 22px;
  background: linear-gradient(135deg, #7DA384 0%, #6A8E72 100%);
  border-radius: 22px;
  box-shadow: 0 6px 20px rgba(125, 163, 132, 0.25);
  position: relative;
  overflow: hidden;
}
.progress-card::before {
  content: '';
  position: absolute;
  top: -40px;
  right: -40px;
  width: 140px;
  height: 140px;
  background: radial-gradient(circle, rgba(255,255,255,0.15), transparent 70%);
  border-radius: 50%;
}

.progress-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: relative;
}

.progress-info-label { font-size: 12px; color: rgba(255,255,255,0.85); font-weight: 600; letter-spacing: 0.02em; }
.progress-info-num { font-size: 30px; font-weight: 800; color: white; margin-top: 4px; letter-spacing: -0.04em; }
.progress-info-num .sub { font-size: 16px; opacity: 0.65; font-weight: 700; }

/* ========== 탭 ========== */
.tab-row {
  display: flex;
  padding: 0 20px;
  margin-bottom: 12px;
  gap: 6px;
}

.tab-btn {
  flex: 1;
  padding: 11px 8px;
  background: transparent;
  color: var(--ink-3);
  font-size: 13px;
  font-weight: 700;
  border-radius: 14px;
  transition: all var(--t-med);
  letter-spacing: -0.01em;
}
.tab-btn.active {
  background: var(--ink-1);
  color: white;
}

/* ========== 약속 카드 ========== */
.content { padding: 0 20px; }

.promise-card {
  background: var(--bg-elev);
  border-radius: 20px;
  padding: 16px;
  margin-bottom: 10px;
  box-shadow: var(--shadow-card);
  transition: all var(--t-med);
  animation: cardSlideIn 0.4s cubic-bezier(0.4, 0, 0.2, 1) backwards;
}
.promise-card.done-state { background: var(--bg-sage-soft); }
.promise-card.fail-state { background: var(--bg-coral-soft); }

@keyframes cardSlideIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

.promise-row {
  display: flex;
  align-items: center;
  gap: 14px;
}

/* O·X 2버튼 그룹 (홈/카드) */
.ox-group {
  display: flex;
  gap: 6px;
  flex-shrink: 0;
}
.ox-btn {
  width: 38px;
  height: 38px;
  border-radius: 12px;
  border: 1.5px solid var(--border-soft);
  background: var(--bg-elev);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  font-weight: 800;
  color: var(--ink-4);
  transition: transform 0.12s ease, background-color 0.18s ease, color 0.18s ease, border-color 0.18s ease;
  -webkit-user-select: none;
  user-select: none;
}
.ox-btn:active { transform: scale(0.88); }
.ox-btn.o-btn.active {
  background: var(--sage);
  border-color: var(--sage);
  color: white;
}
.ox-btn.x-btn.active {
  background: var(--coral);
  border-color: var(--coral);
  color: white;
}

/* 상세 화면(멤버 행)용 살짝 작은 버전 */
.ox-group.compact .ox-btn {
  width: 34px;
  height: 34px;
  font-size: 14px;
  border-radius: 10px;
}

/* 읽기 전용 (다른 멤버) */
.ox-btn.readonly {
  pointer-events: none;
  opacity: 0.85;
}

/* 레거시(혹시 남아있을 경우) */
.check-circle {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  border: 2px solid var(--border-soft);
  background: transparent;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: all var(--t-spring);
  position: relative;
}
.check-circle.done { background: var(--sage); border-color: var(--sage); }
.check-circle.fail { background: var(--coral); border-color: var(--coral); }
.check-circle:active { transform: scale(0.85); }
.check-icon {
  color: white;
  font-weight: 900;
  font-size: 16px;
  line-height: 1;
  opacity: 0;
  transform: scale(0.5);
  transition: all var(--t-spring);
}
.check-circle.done .check-icon,
.check-circle.fail .check-icon {
  opacity: 1;
  transform: scale(1);
}

.promise-body {
  flex: 1;
  min-width: 0;
}

.promise-name-row {
  display: flex;
  align-items: center;
  gap: 6px;
}

.promise-emoji { font-size: 18px; flex-shrink: 0; }

.promise-name {
  font-size: 15px;
  font-weight: 700;
  color: var(--ink-1);
  letter-spacing: -0.02em;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.promise-card.done-state .promise-name {
  color: var(--ink-2);
  text-decoration: line-through;
  text-decoration-color: var(--ink-4);
}

.promise-meta {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-top: 5px;
}

.meta-item {
  display: inline-flex;
  align-items: center;
  gap: 3px;
  font-size: 11px;
  color: var(--ink-3);
  font-weight: 600;
}

.meta-icon { font-size: 11px; }

.meta-streak { color: var(--honey); }
.meta-streak .meta-icon { font-size: 12px; }

.lock-icon {
  display: inline-flex;
  align-items: center;
  font-size: 10px;
  padding: 2px 6px;
  background: var(--bg-lavender-soft);
  color: var(--lavender);
  border-radius: 100px;
  font-weight: 700;
}

/* ========== 빈 상태 ========== */
.empty-state {
  text-align: center;
  padding: 80px 20px;
}
.empty-emoji { font-size: 48px; margin-bottom: 16px; }
.empty-title { font-size: 16px; font-weight: 700; color: var(--ink-1); margin-bottom: 6px; }
.empty-sub { font-size: 13px; color: var(--ink-3); font-weight: 500; }

/* ========== 둘러보기 카드 ========== */
.room-card {
  background: var(--bg-elev);
  border-radius: 20px;
  padding: 18px;
  margin-bottom: 10px;
  box-shadow: var(--shadow-card);
  transition: all var(--t-med);
  animation: cardSlideIn 0.4s cubic-bezier(0.4, 0, 0.2, 1) backwards;
}
.room-card:active { transform: scale(0.98); }
.room-card.secret-locked { background: linear-gradient(135deg, var(--bg-lavender-soft), #F4F0F8); }

.room-card-top {
  display: flex;
  align-items: center;
  gap: 14px;
}

.room-emoji-box {
  width: 52px;
  height: 52px;
  border-radius: 16px;
  background: var(--bg-mute);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 26px;
  flex-shrink: 0;
}
.secret-locked .room-emoji-box {
  background: var(--lavender);
  color: white;
}

.room-info { flex: 1; min-width: 0; }

.room-name {
  font-size: 16px;
  font-weight: 700;
  color: var(--ink-1);
  letter-spacing: -0.02em;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.room-desc {
  font-size: 12px;
  color: var(--ink-3);
  margin-top: 2px;
  font-weight: 500;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.room-meta {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-top: 8px;
}

.room-badge {
  display: inline-flex;
  align-items: center;
  gap: 3px;
  font-size: 10px;
  font-weight: 700;
  padding: 3px 8px;
  border-radius: 100px;
  letter-spacing: 0.01em;
}
.room-badge.public { background: var(--bg-sage-soft); color: var(--sage-dark); }
.room-badge.secret { background: var(--bg-lavender-soft); color: var(--lavender); }
.room-badge.member { background: var(--bg-coral-soft); color: var(--coral-dark); }
.room-badge.count { background: var(--bg-mute); color: var(--ink-3); }

/* ========== 약속 상세 ========== */
.detail-hero {
  text-align: center;
  padding: 28px 20px;
  background: var(--bg-elev);
  border-radius: 24px;
  box-shadow: var(--shadow-card);
  margin-bottom: 20px;
  position: relative;
  overflow: hidden;
}
.detail-hero::before {
  content: '';
  position: absolute;
  top: -60px;
  left: 50%;
  transform: translateX(-50%);
  width: 200px;
  height: 200px;
  background: radial-gradient(circle, rgba(168, 196, 173, 0.18), transparent 70%);
  border-radius: 50%;
}
.detail-hero-emoji { font-size: 52px; margin-bottom: 8px; position: relative; }
.detail-hero-name { font-size: 22px; font-weight: 800; color: var(--ink-1); letter-spacing: -0.03em; position: relative; }
.detail-hero-desc { font-size: 13px; color: var(--ink-3); margin-top: 6px; font-weight: 500; position: relative; }
.detail-hero-meta {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  margin-top: 12px;
  padding: 6px 14px;
  background: var(--bg-mute);
  border-radius: 100px;
  font-size: 12px;
  font-weight: 600;
  color: var(--ink-2);
  position: relative;
}

.section-label {
  font-size: 11px;
  font-weight: 800;
  color: var(--ink-3);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin: 24px 0 12px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.member-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 16px;
  background: var(--bg-elev);
  border-radius: 16px;
  margin-bottom: 8px;
  box-shadow: var(--shadow-card);
}

.member-info { display: flex; align-items: center; gap: 12px; flex: 1; min-width: 0; }
.member-name { font-size: 15px; font-weight: 600; color: var(--ink-1); }
.member-name .me-tag { font-size: 11px; color: var(--ink-4); font-weight: 500; margin-left: 4px; }

.member-streak {
  display: inline-flex;
  align-items: center;
  gap: 3px;
  font-size: 11px;
  color: var(--honey);
  font-weight: 700;
  margin-top: 3px;
}

.poke-btn {
  display: inline-flex;

/* ========== 토스트 ========== */

<body>

<div id="app"><div class="loading-screen"><div class="spinner"></div><div class="loading-text">준비하는 중...</div></div></div>

<script>
// ============================================================
// 같이지켜 - Frontend
// ============================================================

// ⚠️ 여기에 본인의 Apps Script 웹 앱 URL을 넣으세요
const API_URL = 'https://script.google.com/macros/s/AKfycbzM67q4gX2hYTT2xzAPpbzE5pTyWI-PvbrQpZ1A_MnSFWG35edGJ2ytD2aSP4V77NB_GA/exec';

// ============================================================
// State
// ============================================================
const state = {
  user: null,
  users: [],
  promises: [],
  rooms: [], // 둘러보기용
  todayChecks: {},
  streaks: {},
  pokes: [],
  comments: {},
  today: null,
  viewDate: null,
  view: 'login',
  homeTab: 'mine', // 'mine' | 'discover'
  selectedPromiseId: null,
  statsData: {},
  modal: null, // null | 'create' | 'pin' | 'leave'
  pinTargetRoom: null,
};

// ============================================================
// Storage
// ============================================================
const LS_KEY = 'gachi_nickname_v1';

function saveNick(nick) {
  try { localStorage.setItem(LS_KEY, nick); } catch(e){}
}
function loadNick() {
  try { return localStorage.getItem(LS_KEY); } catch(e){ return null; }
}
function clearNick() {
  try { localStorage.removeItem(LS_KEY); } catch(e){}
}

// ============================================================
// API
// ============================================================
async function api(action, data = {}) {
  if (!API_URL || API_URL === 'YOUR_APPS_SCRIPT_URL_HERE') {
    return { ok: false, error: 'API_URL이 설정되지 않았어요. index.html 상단에서 설정해주세요.' };
  }
  try {
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({ action, ...data }),
      redirect: 'follow',
    });
    return await res.json();
  } catch (err) {
    return { ok: false, error: '연결 오류: ' + err.message };
  }
}

// ============================================================
// Helpers
// ============================================================
function $(sel, root = document) { return root.querySelector(sel); }
function $$(sel, root = document) { return [...root.querySelectorAll(sel)]; }

function showToast(msg, ms = 2000) {
  const old = $('.toast');
  if (old) old.remove();
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => {
    t.style.transition = 'opacity 0.3s';
    t.style.opacity = '0';
    setTimeout(() => t.remove(), 300);
  }, ms);
}

function fmtDateLabel(dateStr) {
  if (!dateStr) return '';
  const [y, m, d] = dateStr.split('-').map(Number);
  const dt = new Date(y, m - 1, d);
  const days = ['일','월','화','수','목','금','토'];
  const dow = days[dt.getDay()];
  return `${m}월 ${d}일 (${dow})`;
}

function prevDay(dateStr) {
  const [y, m, d] = dateStr.split('-').map(Number);
  const dt = new Date(y, m - 1, d);
  dt.setDate(dt.getDate() - 1);
  return `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`;
}
function nextDay(dateStr) {
  const [y, m, d] = dateStr.split('-').map(Number);
  const dt = new Date(y, m - 1, d);
  dt.setDate(dt.getDate() + 1);
  return `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`;
}

function nextStatus(curr) {
  // 미체크 → done → fail → 미체크
  if (curr === null || curr === undefined) return 'done';
  if (curr === 'done') return 'fail';
  return null;
}

function escapeHtml(s) {
  if (s == null) return '';
  return String(s).replace(/[&<>"']/g, ch => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[ch]));
}

// ============================================================
// DOM 직접 업데이트 (re-render 없이 빠르게)
// ============================================================
function updateCardOX(promiseId, status) {
  // 홈 카드
  const card = document.querySelector(`[data-card="${promiseId}"]`);
  if (card) {
    card.classList.remove('done-state', 'fail-state');
    if (status === 'done') card.classList.add('done-state');
    else if (status === 'fail') card.classList.add('fail-state');
    
    const oBtn = card.querySelector('.o-btn');
    const xBtn = card.querySelector('.x-btn');
    if (oBtn) oBtn.classList.toggle('active', status === 'done');
    if (xBtn) xBtn.classList.toggle('active', status === 'fail');
  }
  // 상세 화면의 본인 행
  const detailRow = document.querySelector(`[data-mrow="${promiseId}-${state.user}"]`);
  if (detailRow) {
    const oBtn = detailRow.querySelector('.o-btn');
    const xBtn = detailRow.querySelector('.x-btn');
    if (oBtn) oBtn.classList.toggle('active', status === 'done');
    if (xBtn) xBtn.classList.toggle('active', status === 'fail');
  }
  
  // 진행률 카드 즉시 업데이트 (홈 화면)
  updateProgressCard();
}

function updateProgressCard() {
  const progressCard = document.querySelector('.progress-card');
  if (!progressCard) return;
  
  const total = state.promises.length;
  const doneCount = state.promises.filter(p => 
    (state.todayChecks[p.id]||{})[state.user] === 'done'
  ).length;
  const rate = total > 0 ? Math.round((doneCount / total) * 100) : 0;
  
  const numEl = progressCard.querySelector('.progress-info-num');
  if (numEl) numEl.innerHTML = `${doneCount}<span class="sub">/${total}</span>`;
  
  const ring = progressCard.querySelector('circle:nth-child(2)');
  if (ring) {
    const r = 28;
    ring.setAttribute('stroke-dashoffset', String(2 * Math.PI * r * (1 - rate / 100)));
  }
  
  const rateText = progressCard.querySelector('text');
  if (rateText) rateText.textContent = `${rate}%`;
}

function updateCardStreak(promiseId, count) {
  // 홈 카드의 스트릭 메타 영역
  const card = document.querySelector(`[data-card="${promiseId}"]`);
  if (card) {
    const meta = card.querySelector('.promise-meta');
    if (meta) {
      const existing = meta.querySelector('.meta-streak');
      if (count > 0) {
        if (existing) {
          existing.innerHTML = `<span class="meta-icon">🔥</span>${count}일`;
        } else {
          const span = document.createElement('span');
          span.className = 'meta-item meta-streak';
          span.innerHTML = `<span class="meta-icon">🔥</span>${count}일`;
          meta.appendChild(span);
        }
      } else if (existing) {
        existing.remove();
      }
    }
  }
}

// ============================================================
// Render Root
// ============================================================
function render() {
  const app = $('#app');
  if (state.view === 'login') return app.innerHTML = renderLogin();
  if (state.view === 'home') {
    app.innerHTML = renderHome();
    bindHome();
    return;
  }
  if (state.view === 'detail') {
    app.innerHTML = renderDetail();
    bindDetail();
    return;
  }
  if (state.view === 'notifications') {
    app.innerHTML = renderNotifications();
    bindCommon();
    return;
  }
  if (state.view === 'stats') {
    app.innerHTML = renderStats();
    bindCommon();
    return;
  }
}

// ============================================================
// LOGIN VIEW
// ============================================================
function renderLogin() {
  return `
    <div class="login-wrap">
      <div class="login-card">
        <div class="login-emoji">🤝</div>
        <h1 class="login-title">같이지켜</h1>
        <p class="login-sub">친구랑 약속, 함께 지켜요</p>
        <div class="login-form">
          <label class="input-label">닉네임</label>
          <input id="nickInput" class="text-input" type="text" placeholder="반에서 부르는 이름" maxlength="8" autocomplete="off" />
          <div id="loginError"></div>
          <button id="loginBtn" class="btn-primary">시작하기</button>
        </div>
      </div>
    </div>
  `;
}

function bindLogin() {
  const input = $('#nickInput');
  const btn = $('#loginBtn');
  const err = $('#loginError');
  
  input.focus();
  
  const handle = async () => {
    const nick = input.value.trim();
    if (!nick) {
      err.innerHTML = '<div class="error-text">닉네임을 입력해주세요</div>';
      return;
    }
    btn.disabled = true;
    btn.textContent = '시작하는 중...';
    const r = await api('login', { nickname: nick });
    if (!r.ok) {
      err.innerHTML = `<div class="error-text">${escapeHtml(r.error)}</div>`;
      btn.disabled = false;
      btn.textContent = '시작하기';
      return;
    }
    state.user = r.nickname;
    saveNick(r.nickname);
    await loadAll();
    state.view = 'home';
    render();
  };
  
  btn.onclick = handle;
  input.onkeydown = e => { if (e.key === 'Enter') handle(); };
}

// ============================================================
// LOAD ALL
// ============================================================
async function loadAll() {
  const r = await api('init', { nickname: state.user, viewDate: state.viewDate || undefined });
  if (!r.ok) {
    showToast(r.error || '로딩 실패');
    return;
  }
  state.users = r.users || [];
  state.promises = r.promises || [];
  state.todayChecks = r.todayChecks || {};
  state.streaks = r.streaks || {};
  state.pokes = r.pokes || [];
  state.comments = r.comments || {};
  state.today = r.today;
  state.viewDate = r.viewDate || r.today;
}

async function loadDayData(date) {
  const r = await api('getDayData', { nickname: state.user, viewDate: date });
  if (!r.ok) {
    showToast(r.error || '로딩 실패');
    return;
  }
  state.todayChecks = r.checks || {};
  state.comments = r.comments || {};
  state.viewDate = r.viewDate || date;
}

async function loadDiscover() {
  const r = await api('getDiscoverRooms', { nickname: state.user });
  if (!r.ok) {
    showToast(r.error || '로딩 실패');
    return;
  }
  state.rooms = r.rooms || [];
}

async function loadStats() {
  const r = await api('getStats', { nickname: state.user });
  if (!r.ok) {
    showToast(r.error || '로딩 실패');
    return;
  }
  state.statsData = r.stats || {};
}

function renderHome() {
  const isToday = state.viewDate === state.today;
  const dateLabel = isToday 
    ? `오늘 <span class="date-today-badge">${fmtDateLabel(state.viewDate)}</span>`
    : `${fmtDateLabel(state.viewDate)} <span class="date-past-badge">기록</span>`;
  
  const myPromises = state.promises || [];
  const total = myPromises.length;
  const doneCount = myPromises.filter(p => (state.todayChecks[p.id]||{})[state.user] === 'done').length;
  const rate = total > 0 ? Math.round((doneCount / total) * 100) : 0;

  return `
    <div class="screen">
      <div class="home-header">
        <div>
          <div class="greet-small">안녕, ${escapeHtml(state.user)} 👋</div>
          <div class="greet-big">우리 약속</div>
        </div>
        <button id="bellBtn" class="bell" aria-label="알림">
          🔔
          ${state.pokes.length > 0 ? `<div class="bell-badge">${state.pokes.length > 9 ? '9+' : state.pokes.length}</div>` : ''}
        </button>
      </div>
      
      <div class="date-nav">
        <button id="prevDayBtn" class="date-arrow" aria-label="어제">‹</button>
        <div class="date-label">${dateLabel}</div>
        <button id="nextDayBtn" class="date-arrow" aria-label="내일" ${isToday ? 'disabled' : ''}>›</button>
      </div>

      ${total > 0 ? `
      <div class="progress-card">
        <div class="progress-row">
          <div>
            <div class="progress-info-label">${isToday ? '오늘 달성률' : '이 날 달성률'}</div>
            <div class="progress-info-num">${doneCount}<span class="sub">/${total}</span></div>
          </div>
          <div>
            <svg width="68" height="68" viewBox="0 0 68 68">
              <circle cx="34" cy="34" r="28" fill="none" stroke="rgba(255,255,255,0.22)" stroke-width="6"/>
              <circle cx="34" cy="34" r="28" fill="none" stroke="white" stroke-width="6"
                stroke-linecap="round"
                stroke-dasharray="${2*Math.PI*28}"
                stroke-dashoffset="${2*Math.PI*28 * (1 - rate/100)}"
                transform="rotate(-90 34 34)"
                style="transition: stroke-dashoffset 0.6s cubic-bezier(0.4, 0, 0.2, 1);"/>
              <text x="34" y="40" text-anchor="middle" fill="white" font-size="16" font-weight="800" font-family="Pretendard">${rate}%</text>
            </svg>
          </div>
        </div>
      </div>` : ''}

      <div class="tab-row">
        <button class="tab-btn ${state.homeTab==='mine'?'active':''}" data-tab="mine">내 약속</button>
        <button class="tab-btn ${state.homeTab==='discover'?'active':''}" data-tab="discover">둘러보기</button>
      </div>

      <div class="content" id="tabContent">
        ${state.homeTab === 'mine' ? renderMineList(isToday) : renderDiscoverList()}
      </div>

      ${renderTabBar('home')}
      ${state.modal === 'create' ? renderCreateModal() : ''}
      ${state.modal === 'pin' ? renderPinModal() : ''}
    </div>
  `;
}

function renderMineList(isToday) {
  const myPromises = state.promises || [];
  if (myPromises.length === 0) {
    return `
      <div class="empty-state">
        <div class="empty-emoji">🌱</div>
        <div class="empty-title">아직 약속이 없어요</div>
        <div class="empty-sub">+ 버튼으로 첫 약속을 만들거나<br>둘러보기에서 친구의 방에 들어가보세요</div>
      </div>
    `;
  }

  return myPromises.map((p, idx) => {
    const checks = state.todayChecks[p.id] || {};
    const myStatus = checks[state.user];
    const stateCls = myStatus === 'done' ? 'done-state' : myStatus === 'fail' ? 'fail-state' : '';
    const friendsDone = p.members.filter(m => m !== state.user && checks[m] === 'done').length;
    const totalFriends = p.members.length - 1;
    const streak = state.streaks[p.id + ':' + state.user]?.count || 0;
    const isSecret = p.visibility === 'secret';

    return `
      <div class="promise-card ${stateCls}" data-card="${p.id}" style="animation-delay:${idx * 50}ms">
        <div class="promise-row">
          <div class="promise-body" data-detail="${p.id}">
            <div class="promise-name-row">
              <span class="promise-emoji">${escapeHtml(p.emoji||'🌱')}</span>
              <span class="promise-name">${escapeHtml(p.name)}</span>
              ${isSecret ? '<span class="lock-icon">🔒</span>' : ''}
            </div>
            <div class="promise-meta">
              ${totalFriends >= 0 ? `<span class="meta-item"><span class="meta-icon">👥</span>${friendsDone}/${totalFriends + 1}</span>` : ''}
              ${streak > 0 ? `<span class="meta-item meta-streak"><span class="meta-icon">🔥</span>${streak}일</span>` : ''}
            </div>
          </div>
          <div class="ox-group">
            <button class="ox-btn o-btn ${myStatus==='done'?'active':''}" data-set="${p.id}" data-status="done" aria-label="지킴">O</button>
            <button class="ox-btn x-btn ${myStatus==='fail'?'active':''}" data-set="${p.id}" data-status="fail" aria-label="못 지킴">X</button>
          </div>
        </div>
      </div>
    `;
  }).join('');
}

function renderDiscoverList() {
  if (!state.rooms || state.rooms.length === 0) {
    return `
      <div class="empty-state">
        <div class="empty-emoji">🔍</div>
        <div class="empty-title">아직 공개된 방이 없어요</div>
        <div class="empty-sub">첫 번째 방을 만들어보세요</div>
      </div>
    `;
  }
  return state.rooms.map((r, idx) => {
    const isSecret = r.visibility === 'secret';
    const isMember = r.isMember;
    const lockedView = isSecret && !isMember;
    
    return `
      <div class="room-card ${lockedView ? 'secret-locked' : ''}" data-room="${r.id}" style="animation-delay:${idx * 50}ms">
        <div class="room-card-top">
          <div class="room-emoji-box">${lockedView ? '🔒' : escapeHtml(r.emoji||'🌱')}</div>
          <div class="room-info">
            <div class="room-name">${escapeHtml(r.name)}</div>
            ${r.description ? `<div class="room-desc">${escapeHtml(r.description)}</div>` : (lockedView ? '<div class="room-desc">PIN을 입력해서 들어가요</div>' : '')}
            <div class="room-meta">
              ${isMember 
                ? '<span class="room-badge member">✓ 참여 중</span>' 
                : (isSecret ? '<span class="room-badge secret">🔒 비밀</span>' : '<span class="room-badge public">🌍 공개</span>')
              }
              <span class="room-badge count">👥 ${r.memberCount}명</span>
            </div>
          </div>
        </div>
      </div>
    `;
  }).join('');
}

function bindHome() {
  // 알림 버튼
  $('#bellBtn').onclick = () => {
    state.view = 'notifications';
    render();
  };
  
  // 날짜 이동
  $('#prevDayBtn').onclick = async () => {
    const d = prevDay(state.viewDate);
    await loadDayData(d);
    render();
  };
  $('#nextDayBtn').onclick = async () => {
    if (state.viewDate === state.today) return;
    const d = nextDay(state.viewDate);
    await loadDayData(d);
    render();
  };
  
  // 탭 전환
  $$('.tab-btn').forEach(btn => {
    btn.onclick = async () => {
      const tab = btn.dataset.tab;
      if (tab === state.homeTab) return;
      state.homeTab = tab;
      if (tab === 'discover') await loadDiscover();
      render();
    };
  });
  
  // 약속 O/X 버튼 (홈 카드)
  $$('[data-set]').forEach(btn => {
    btn.onclick = (e) => {
      e.stopPropagation();
      const id = btn.dataset.set;
      const clicked = btn.dataset.status; // 'done' or 'fail'
      const checks = state.todayChecks[id] || {};
      const curr = checks[state.user];
      // 같은 버튼 다시 누르면 미체크로 복귀
      const next = (curr === clicked) ? null : clicked;
      
      // 1. 상태 즉시 갱신
      checks[state.user] = next;
      state.todayChecks[id] = checks;
      
      // 2. DOM 직접 업데이트 (re-render 없이!)
      updateCardOX(id, next);
      
      // 3. API는 백그라운드 호출 (await 없이)
      api('setStatus', { 
        promiseId: id, 
        nickname: state.user, 
        status: next,
        targetDate: state.viewDate,
      }).then(r => {
        if (r.ok && r.streak) {
          state.streaks[id + ':' + state.user] = r.streak;
          // 스트릭 표시만 살짝 업데이트
          updateCardStreak(id, r.streak.count);
        }
      }).catch(() => {});
    };
  });
  
  // 약속 상세
  $$('[data-detail]').forEach(el => {
    el.onclick = () => {
      state.selectedPromiseId = el.dataset.detail;
      state.view = 'detail';
      render();
    };
  });
  
  // 둘러보기 방 클릭
  $$('[data-room]').forEach(el => {
    el.onclick = async () => {
      const roomId = el.dataset.room;
      const room = state.rooms.find(r => r.id === roomId);
      if (!room) return;
      
      if (room.isMember) {
        // 이미 멤버 → 상세로 이동
        state.selectedPromiseId = roomId;
        // promises에 없을 수도 있으니 init 재호출
        await loadAll();
        state.view = 'detail';
        render();
        return;
      }
      
      if (room.visibility === 'secret') {
        // PIN 모달
        state.pinTargetRoom = room;
        state.modal = 'pin';
        render();
      } else {
        // 공개방 바로 입장
        await joinRoom(roomId, '');
      }
    };
  });
  
  // FAB 만들기
  const fab = $('#fabBtn');
  if (fab) fab.onclick = () => { state.modal = 'create'; render(); };
  
  // 탭바
  bindTabBar();
  
  // 모달
  if (state.modal === 'create') bindCreateModal();
  if (state.modal === 'pin') bindPinModal();
}

// ============================================================
// 방 입장
// ============================================================
async function joinRoom(roomId, pin) {
  const r = await api('joinRoom', { promiseId: roomId, nickname: state.user, pin });
  if (!r.ok) {
    if (r.wrongPin) {
      showToast('PIN이 일치하지 않아요 🔒');
    } else {
      showToast(r.error || '입장 실패');
    }
    return false;
  }
  if (r.alreadyMember) {
    showToast('이미 참여 중인 방이에요');
  } else {
    showToast('방에 들어왔어요 🎉');
  }
  state.modal = null;
  state.pinTargetRoom = null;
  await loadAll();
  await loadDiscover();
  render();
  return true;
}

function bindCreateModal() {
  $('#modalOverlay').onclick = () => { state.modal = null; createForm = { name:'', desc:'', emoji:'🌱', vis:'public', pin:'' }; render(); };
  $('#modalClose').onclick = () => { state.modal = null; createForm = { name:'', desc:'', emoji:'🌱', vis:'public', pin:'' }; render(); };
  
  $$('[data-emoji]').forEach(btn => {
    btn.onclick = () => {
      // 폼 입력값 보존하면서 이모지만 갱신
      createForm.name = $('#createName').value;
      createForm.desc = $('#createDesc').value;
      if ($('#createPin')) createForm.pin = $('#createPin').value;
      createForm.emoji = btn.dataset.emoji;
      render();
    };
  });
  
  $$('[data-vis]').forEach(btn => {
    btn.onclick = () => {
      createForm.name = $('#createName').value;
      createForm.desc = $('#createDesc').value;
      if ($('#createPin')) createForm.pin = $('#createPin').value;
      createForm.vis = btn.dataset.vis;
      render();
    };
  });
  
  $('#createSubmit').onclick = async () => {
    const name = $('#createName').value.trim();
    const desc = $('#createDesc').value.trim();
    const pin = $('#createPin') ? $('#createPin').value.trim() : '';
    
    if (!name) { showToast('약속 이름을 입력해주세요'); return; }
    if (createForm.vis === 'secret' && !/^\d{4}$/.test(pin)) { showToast('PIN은 4자리 숫자로'); return; }
    
    const btn = $('#createSubmit');
    btn.disabled = true;
    btn.textContent = '만드는 중...';
    
    const r = await api('createPromise', {
      name, description: desc, emoji: createForm.emoji,
      visibility: createForm.vis, pin: pin || '',
      createdBy: state.user,
    });
    
    if (!r.ok) {
      showToast(r.error || '실패');
      btn.disabled = false;
      btn.textContent = '만들기';
      return;
    }
    
    showToast('약속이 만들어졌어요 🎉');
    state.modal = null;
    createForm = { name:'', desc:'', emoji:'🌱', vis:'public', pin:'' };
    await loadAll();
    render();
  };
}

function bindPinModal() {
  $('#pinOverlay').onclick = () => { state.modal = null; state.pinTargetRoom = null; render(); };
  $('#pinClose').onclick = () => { state.modal = null; state.pinTargetRoom = null; render(); };
  
  const input = $('#pinEnter');
  setTimeout(() => input.focus(), 100);
  
  const submit = async () => {
    const pin = input.value.trim();
    if (!/^\d{4}$/.test(pin)) { showToast('4자리 숫자를 입력해주세요'); return; }
    const btn = $('#pinSubmit');
    btn.disabled = true;
    btn.textContent = '들어가는 중...';

    btn.disabled = false;
    btn.textContent = '들어가기';
  };
  
  $('#pinSubmit').onclick = submit;
  input.onkeydown = e => { if (e.key === 'Enter') submit(); };
}

  $('#backBtn').onclick = () => { state.view = 'home'; render(); };
  
  $('#leaveBtn').onclick = async () => {
    if (!confirm('이 약속에서 나갈까요?\n다시 들어오려면 둘러보기에서 찾아야 해요.')) return;
    const r = await api('leaveRoom', { promiseId: state.selectedPromiseId, nickname: state.user });
    if (r.ok) {
      showToast('방에서 나왔어요');
      state.view = 'home';
      await loadAll();
      render();
    } else {
      showToast(r.error || '실패');
    }
  };
  
  $('#dPrev').onclick = async () => {
    const d = prevDay(state.viewDate);
    await loadDayData(d);
    render();
  };
  $('#dNext').onclick = async () => {
    if (state.viewDate === state.today) return;
    const d = nextDay(state.viewDate);
    await loadDayData(d);
    render();
  };
  
  $$('[data-mset]').forEach(btn => {
    btn.onclick = (e) => {
      e.stopPropagation();
      const id = btn.dataset.mset;
      const clicked = btn.dataset.status;
      const checks = state.todayChecks[id] || {};
      const curr = checks[state.user];
      const next = (curr === clicked) ? null : clicked;
      
      checks[state.user] = next;
      state.todayChecks[id] = checks;
      
      // DOM 즉시 업데이트
      updateCardOX(id, next);
      
      // 백그라운드 호출
      api('setStatus', { 
        promiseId: id, nickname: state.user, 
        status: next, targetDate: state.viewDate 
      }).then(r => {
        if (r.ok && r.streak) {
          state.streaks[id + ':' + state.user] = r.streak;
        }
      }).catch(() => {});
    };
  });
  
  $$('[data-poke]').forEach(btn => {
    btn.onclick = async () => {
      const target = btn.dataset.poke;
      const pid = btn.dataset.pid;
      const p = state.promises.find(x => x.id === pid);
      
      btn.classList.add('sent');
      setTimeout(() => btn.classList.remove('sent'), 700);
      
      const r = await api('sendPoke', {
        from: state.user, to: target, promiseId: pid,
        promiseName: p?.name, promiseEmoji: p?.emoji,
      });
      if (r.ok) {
        showToast(`${target}님께 콕! 👉`);
      }
    };
  });
  
  const cInput = $('#commentInput');
  const cBtn = $('#commentSend');
  const submitComment = async () => {
    const text = cInput.value.trim();
    if (!text) return;
    cBtn.disabled = true;
    const r = await api('addComment', { 
      promiseId: state.selectedPromiseId, 
      author: state.user, 
      text,
      targetDate: state.viewDate,
    });
    if (r.ok) {
      const newC = { author: state.user, text, time: new Date().toISOString() };
      if (!state.comments[state.selectedPromiseId]) state.comments[state.selectedPromiseId] = [];
      state.comments[state.selectedPromiseId].push(newC);
      cInput.value = '';
      render();
    } else {
      showToast('실패');
    }
    cBtn.disabled = false;
  };
  cBtn.onclick = submitComment;
  cInput.onkeydown = e => { if (e.key === 'Enter') submitComment(); };
  
  bindTabBar();
}

// ============================================================
// NOTIFICATIONS VIEW
// ============================================================
function renderNotifications() {
  return `
    <div class="screen">
      <div class="header">
        <button class="header-back" id="backBtn">‹</button>
        <div class="header-title">받은 콕 👉</div>
        ${state.pokes.length > 0 ? '<button class="text-mini-btn" id="clearBtn">비우기</button>' : '<div class="header-spacer"></div>'}
      </div>

      <div class="content">
        ${state.pokes.length === 0 ? `
          <div class="empty-state">
            <div class="empty-emoji">📭</div>
            <div class="empty-title">받은 콕이 없어요</div>
            <div class="empty-sub">친구가 콕 찌르면 여기에 와요</div>
          </div>
        ` : state.pokes.slice().reverse().map(pk => {
          const d = new Date(pk.createdAt);
          const t = `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
          return `
            <div class="poke-card">
              <div class="poke-avatar">👉</div>
              <div class="poke-text">
                <div class="poke-line"><span class="poke-from">${escapeHtml(pk.from)}</span>님이 콕 찔렀어요</div>
                <div class="poke-meta">${escapeHtml(pk.promiseEmoji||'')} ${escapeHtml(pk.promiseName||'')} · ${t}</div>
              </div>
            </div>
          `;
        }).join('')}
      </div>

      ${renderTabBar('notifications')}
    </div>
  `;
}

// ============================================================
// STATS VIEW
// ============================================================
function renderStats() {
  const items = Object.entries(state.statsData || {});
  
  return `
    <div class="screen">
      <div class="header">
        <button class="header-back" id="backBtn">‹</button>
        <div class="header-title">이번 주 기록</div>
        <div class="header-spacer"></div>
      </div>

      <div class="content">
        ${items.length === 0 ? `
          <div class="empty-state">
            <div class="empty-emoji">📊</div>
            <div class="empty-title">기록이 아직 없어요</div>
            <div class="empty-sub">약속을 만들고 체크해보세요</div>
          </div>
        ` : items.map(([id, stat]) => {
          const rateCls = stat.weekRate >= 70 ? 'high' : stat.weekRate >= 40 ? 'mid' : 'low';
          const skipCount = 7 - stat.doneCount - stat.failCount;
          
          return `
            <div class="stat-card">
              <div class="stat-card-top">
                <div class="stat-card-name">
                  <span style="font-size:22px">${escapeHtml(stat.emoji||'🌱')}</span>
                  <span>${escapeHtml(stat.name)}</span>
                </div>
                <div class="stat-rate-pill ${rateCls}">${stat.weekRate}%</div>
              </div>
              <div class="stat-days">
                ${stat.days.map(d => `
                  <div class="stat-day">
                    <div class="stat-day-label">${d.label}</div>
                    <div class="stat-day-cell ${d.status==='done'?'done':d.status==='fail'?'fail':''}">
                      ${d.status==='done'?'✓':d.status==='fail'?'✕':''}
                    </div>
                  </div>
                `).join('')}
              </div>
              <div class="stat-counts">
                <span><span class="done-dot"></span>지킴 ${stat.doneCount}</span>
                <span><span class="fail-dot"></span>못 지킴 ${stat.failCount}</span>
                <span><span class="skip-dot"></span>미체크 ${skipCount}</span>
              </div>
            </div>
          `;
        }).join('')}
      </div>

      ${renderTabBar('stats')}
    </div>
  `;
}

// ============================================================
// TAB BAR
// ============================================================
function renderTabBar(activeTab) {
  return `
    <div class="tabbar">
      <button class="tab-item ${activeTab==='home'?'active':''}" data-nav="home">
        <div class="tab-icon">🏠</div>
        <div class="tab-label">홈</div>
      </button>
      <button class="fab" id="fabBtn" aria-label="새 약속">+</button>
      <button class="tab-item ${activeTab==='stats'?'active':''}" data-nav="stats">
        <div class="tab-icon">📊</div>
        <div class="tab-label">기록</div>
      </button>
    </div>
  `;
}

function bindTabBar() {
  $$('[data-nav]').forEach(btn => {
    btn.onclick = async () => {
      const target = btn.dataset.nav;
      if (target === 'home') {
        state.view = 'home';
        state.viewDate = state.today;
        await loadAll();
        if (state.homeTab === 'discover') await loadDiscover();
      } else if (target === 'stats') {
        state.view = 'stats';
        await loadStats();
      }
      render();
    };
  });
  
  const fab = $('#fabBtn');
  if (fab) fab.onclick = () => { state.modal = 'create'; render(); };
}

function bindCommon() {
  const back = $('#backBtn');
  if (back) back.onclick = () => { state.view = 'home'; render(); };
  
  const clear = $('#clearBtn');
  if (clear) clear.onclick = async () => {
    if (!confirm('받은 콕을 모두 비울까요?')) return;
    const r = await api('clearPokes', { nickname: state.user });
    if (r.ok) {
      state.pokes = [];
      render();
      showToast('비웠어요');
    }
  };
  
  bindTabBar();
}

// ============================================================
// INIT
// ============================================================
(async function init() {
  const savedNick = loadNick();
  
  if (savedNick) {
    state.user = savedNick;
    // 닉네임 다시 등록(또는 확인)
    const r = await api('login', { nickname: savedNick });
    if (r.ok) {
      await loadAll();
      state.view = 'home';
      render();
      return;
    } else {
      clearNick();
    }
  }
  
  state.view = 'login';
  render();
  bindLogin();
})();
</script>
